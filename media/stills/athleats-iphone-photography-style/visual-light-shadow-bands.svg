<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Hard sun and shadow bands</title>
  <desc id="desc">Diagram showing sunlight stripes crossing warm skin shape and dark foreground hair.</desc>
  <rect width="1200" height="700" fill="#211a13"/>
  <ellipse cx="520" cy="380" rx="430" ry="210" fill="#b96f35"/>
  <g opacity=".82">
    <rect x="-40" y="70" width="1460" height="54" fill="#f8e0a6" transform="rotate(-31 600 350)"/>
    <rect x="-60" y="250" width="1460" height="42" fill="#f8e0a6" transform="rotate(-31 600 350)"/>
    <rect x="-60" y="420" width="1460" height="34" fill="#f8e0a6" transform="rotate(-31 600 350)"/>
  </g>
  <path d="M890 0 C790 180 846 420 754 700 H1200 V0Z" fill="#120b08" opacity=".9"/>
  <text x="70" y="82" fill="#f8f7f3" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">directional sun creates texture</text>
  <text x="70" y="128" fill="#d7c6a9" font-family="Inter, Arial, sans-serif" font-size="24">skin grain and shadow stripes make the scene feel photographed</text>
</svg>
